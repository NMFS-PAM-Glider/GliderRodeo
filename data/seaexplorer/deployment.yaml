metadata:
  # https://github.com/ioos/ioosngdac/wiki/NGDAC-NetCDF-File-Format-Version-2
  acknowledgement: This work was supported by funding from NOAA.
  comment:        "Underwater Glider Challange 2026 (aka Glider Rodeo)"
  contributor_name: Heidi Taylor, Jennifer Walsh, Anthony Cossio, Tegan Murray, Kourtney Burger, Samuel Woodman
  contributor_role: Principal Investigator, Glider Pilot, Glider Pilot, Glider Pilot, Glider Pilot, Data Manager
  creator_email: nmfs.swfsc.esd-gliders@noaa.gov
  creator_name:  Kourtney Burger
  creator_url:   https://www.fisheries.noaa.gov/about/southwest-fisheries-science-center
  # date_created etc: added automatically
  # numbers must be enclosed by strings so YAML keeps as strings
  deployment_id: '1'
  deployment_name: 'SEA117.26'
  deployment_start: '2026-01-28'
  deployment_end: '2026-02-09'
  format_version: IOOS_Glider_NetCDF_v2.0.nc
  # id filled automatically...
  glider_name: SEA117
  glider_serial: '117'
  glider_model: SeaExplorer
  glider_instrument_name: seaexplorer
  institution: NOAA SWFSC Ecosystem Science Division
  keywords: "AUVS, Autonomous Underwater Vehicles, Oceans, Ocean Pressure,
             Water Pressure, Oceans, Ocean Temperature, Water Temperature,
             Oceans, Salinity/Density, Conductivity, Oceans,
             Salinity/Density, Density, Oceans, Salinity/Density, Salinity"
  keywords_vocabulary: GCMD Science Keywords
  license: This data may be redistributed and used without restriction. Data provided
    as is with no expressed or implied assurance of quality assurance or quality control.
  Metadata_Conventions: Unidata Dataset Discovery v1.0, COARDS, CF-1.8
  metadata_link: https://swfsc.github.io/glider-lab-manual/
  naming_authority: gov.noaa.fisheries
  platform_type:    "SeaExplorer Glider"
  processing_level: "Data provided as is with no expressed or implied
                     assurance of quality assurance or quality control."
  project: GLIDERRODEO
  publisher_email: sam.woodman@noaa.gov
  publisher_name: Sam Woodman
  publisher_url: https://www.fisheries.noaa.gov/about/southwest-fisheries-science-center
  references: https://swfsc.github.io/glider-lab-manual/, https://github.com/c-proof/pyglider,
    https://github.com/SWFSC/esdglider
  sea_name: North Pacific Ocean
  source: Observational data from a profiling glider
  standard_name_vocabulary: CF Standard Name Table v72
  summary: 'These data are part of the NOAA Fisheries 2026 Underwater Glider Challenge. This was a two-week field trial off the coast of Hawaii to evaluate gliders equipped with passive acoustic monitoring (PAM) and assess how these platforms can be used to augment ship-based marine mammal surveys. This glider was equipped with a WISPR PAM sensor. Other sensors included a CTD, an optical sensor (ECO Puck) for chlorophyll, backscatter, and colored dissolved organic matter measurements, photosynthetic active radiation sensor, and an oxygen sensor. Following the Glider Challenge, this glider also stayed deployed to collect data for the Pacific Islands Fisheries Science Center 2026 Winter Hawaiian Islands Cetacean and Ecosystem Assessment Survey.'
  transmission_system: IRIDIUM
  wmo_id: ' '


glider_devices:
  ctd:
    make: RBR
    model: Legato
    serial: '230630'
    long_name: RBRlegato 3
    make_model: RBRlegato 3
    factory_calibrated: "Yes"
    calibration_date: ""
    # calibration_report: " "
    comment:   " "
    platform: platform
    type: instrument
  pam:
    make: Alseamar
    model: Auris Acoustic Antenna
    serial: '666'
    calibration_date: ''
    factory_calibrated: ''
    description: 'SEA117 was equipped with an acoustic antenna designed by ALSEAMAR. The version chosen for this mission is the antenna made up of 4 hydrophones in a tetrahedral configuration. The AURIS onboard processing platform can also be used. The data is temporarily stored on an SD card at each yo and transferred to a storage hard disk at each surfacing. The acoustic payload includes the AURIS platform with a Jetson Nano computer, an ADC and its distribution board, pre-amplifiers, and 4 hydrophones. '
    platform: platform
    type: instrument

# map between glider variables and netcdf variables.  This shouldn't
# change too much.
netcdf_variables:
  timebase:
    source:       LEGATO_TEMPERATURE
  # Time and Place:
  time:
    source:        time
    long_name:     Time
    standard_name: time
    axis:          T
    observation_type: "measured"
    coordinates:   time depth latitude longitude

  latitude:
    source:       Lat
    long_name:    latitude
    standard_name: latitude
    units:        degrees_north
    axis:         Y
    coordinates:   time depth latitude longitude
    conversion:   nmea2deg
    comment:     "Estimated between surface fixes"
    observation_type: measured
    platform:     platform
    reference:    WGS84
    valid_max:    90.0
    valid_min:    -90.0
    coordinate_reference_frame:  urn:ogc:crs:EPSG::4326

  longitude:
    source:       Lon
    long_name:    longitude
    standard_name: longitude
    units:        degrees_east
    axis:         X
    coordinates:  time depth latitude longitude
    conversion:   nmea2deg
    comment:     "Estimated between surface fixes"
    observation_type: measured
    platform:     platform
    reference:    WGS84
    valid_max:    180.0
    valid_min:    -180.0
    coordinate_reference_frame:  urn:ogc:crs:EPSG::4326

  heading:
    source:       Heading
    long_name:    glider heading angle
    standard_name: platform_orientation
    units:        degrees
    coordinates:  time depth latitude longitude

  pitch:
    source:       Pitch
    long_name:    glider pitch angle
    standard_name: platform_pitch_angle
    units:        degrees
    coordinates:  time depth latitude longitude

  roll:
    source:       Roll
    long_name:    glider roll angle
    standard_name: platform_roll_angle
    units:        degrees
    coordinates:  time depth latitude longitude

  # data parameters
  conductivity:
    source:       LEGATO_CONDUCTIVITY
    long_name:    water conductivity
    standard_name: sea_water_electrical_conductivity
    units:        S m-1
    coordinates:  time depth latitude longitude
    instrument:    instrument_ctd
    valid_min:    0
    valid_max:    85
    observation_type: "measured"
    accuracy:      0.0003
    resolution:    0.0001

  temperature:
    source:       LEGATO_TEMPERATURE
    long_name:    water temperature
    standard_name: sea_water_temperature
    units:        Celsius
    coordinates:  time depth latitude longitude
    instrument:   instrument_ctd
    valid_min:    -5
    valid_max:    42
    observation_type: "measured"
    accuracy:      0.002
    resolution:    0.00005

  pressure:
    source:       LEGATO_PRESSURE
    long_name:    water pressure
    standard_name:  sea_water_pressure
    units:        dbar
    coordinates:  time depth latitude longitude
    valid_min:    0
    valid_max:    1000
    positive:      "down"
    reference_datum:  "sea-surface"
    instrument:     "instrument_ctd"
    observation_type: "measured"
    accuracy:         0.05
    resolution:       0.001
    comment:          "ctd pressure sensor"

